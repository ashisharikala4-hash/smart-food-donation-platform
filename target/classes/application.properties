server.port=8086

# H2 File-based Database for persistence
spring.datasource.url=jdbc:h2:file:./data/fooddonationdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Needed for SPA fallback route patterns (Spring Boot 3 defaults to PathPatternParser).
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Configuration
app.jwt.secret=SmartFoodDonationPlatformSecureKey2024ForJWTAuthenticationLongEnough
app.jwt.expiration=86400000

# Logging
logging.level.com.donation=INFO
logging.level.org.springframework.security=WARN
